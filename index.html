<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JCMU Japanese Trainer</title>
<style>
body {font-family: Arial, sans-serif;margin:0;padding:0;background:#f5f5f5;}
header {background:#003366;color:white;padding:16px;text-align:center;font-size:20px;}
.container {padding:16px;}
button {width:100%;padding:14px;margin:8px 0;font-size:16px;border-radius:10px;border:none;background:#0066cc;color:white;}
button.secondary {background:#888;}
#conversation {background:white;padding:16px;border-radius:12px;min-height:200px;margin-bottom:12px;}
.feedback {background:#fff;padding:12px;border-radius:12px;}
.badge {display:inline-block;padding:4px 8px;margin:2px;border-radius:8px;background:#e0f0ff;font-size:12px;}
.grid {display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.card {background:white;padding:12px;border-radius:10px;text-align:center;font-size:20px;}
.progress {background:white;padding:12px;border-radius:12px;margin-top:10px;}
</style>
</head>
<body>
<header>JCMU Japanese Trainer</header>
<div class="container">

<div id="home">
<h3>Core Training</h3>
<button onclick="showMenu('genki')">📘 Genki Lesson 1</button>
<button onclick="showMenu('genki2')">📗 Genki Lesson 2</button>
<button onclick="showMenu('hiragana')">🔤 Hiragana Unit</button>
<button onclick="showMenu('katakana')">🔡 Katakana Unit</button>
<button onclick="showMenu('kanaQuiz')">🧠 Kana Quiz</button>
<button onclick="showMenu('survival')">🗺 JCMU Survival Mode</button>
<button onclick="showMenu('progress')">📊 Progress</button>
</div>

<div id="survival" style="display:none;">
<h3>JCMU Survival Mode</h3>
<button onclick="startScenario('train')">🚉 Train Station</button>
<button onclick="startScenario('conbini')">🏪 Convenience Store</button>
<button onclick="startScenario('bus')">🧭 Bus</button>
<button onclick="startScenario('cafeteria')">🍱 Cafeteria</button>
<button onclick="startScenario('cityhall')">🏫 City Hall</button>
<button onclick="startScenario('bike')">🚲 Bike Rental</button>
<button onclick="startScenario('pharmacy')">💊 Pharmacy</button>
<button class="secondary" onclick="goHome()">Back</button>
</div>

<div id="genki" style="display:none;">
<h3>Genki I - Lesson 1</h3>
<button onclick="startScenario('host')">🎤 Meet Host Family</button>
<button onclick="startScenario('classmates')">🎤 Meet Classmates</button>
<button onclick="startScenario('professor')">🎤 Meet Professor</button>
<button class="secondary" onclick="goHome()">Back</button>
</div>

<div id="genki2" style="display:none;">
<h3>Genki I - Lesson 2</h3>
<button onclick="startScenario('shopping')">🛒 Shopping</button>
<button onclick="startScenario('restaurant')">🍜 Restaurant</button>
<button onclick="startScenario('time')">⏰ Asking Time</button>
<button class="secondary" onclick="goHome()">Back</button>
</div>

<div id="scenario" style="display:none;">
<div id="conversation"></div>
<button onclick="repeatPrompt()">🔁 Repeat</button>
<button onclick="startListening()">🎤 Tap to Speak</button>
<button onclick="showExample()">💡 Example</button>
<button class="secondary" onclick="goHome()">Back</button>
<div class="feedback" id="feedback"></div>
</div>

<div id="hiragana" style="display:none;">
<h3>Hiragana Practice</h3>
<div class="grid" id="hiraganaGrid"></div>
<button class="secondary" onclick="goHome()">Back</button>
</div>

<div id="katakana" style="display:none;">
<h3>Katakana Practice</h3>
<div class="grid" id="katakanaGrid"></div>
<button class="secondary" onclick="goHome()">Back</button>
</div>

<div id="kanaQuiz" style="display:none;">
<h3>Kana Quiz</h3>
<div id="quizQuestion"></div>
<button onclick="nextQuiz()">Next</button>
<button class="secondary" onclick="goHome()">Back</button>
</div>

<div id="progress" style="display:none;">
<h3>Student Progress</h3>
<div class="progress" id="progressData"></div>
<button class="secondary" onclick="goHome()">Back</button>
</div>

</div>

<script>
let scenario=null;
let step=0;
let score=0;
let progress=JSON.parse(localStorage.getItem("jcmuProgress")||"{}");

const scenarios={
 bus:[
  {jp:"このバスは彦根駅に行きますか？",hint:"Ask destination",example:"彦根駅に行きますか？"},
  {jp:"いくらですか？",hint:"Ask fare",example:"いくらですか？"},
  {jp:"ありがとうございます。",hint:"Be polite",example:"ありがとうございます。"}
 ],
 cafeteria:[
  {jp:"おすすめは何ですか？",hint:"Ask recommendation",example:"おすすめは何ですか？"},
  {jp:"カレーをください。",hint:"Order food",example:"カレーをください。"},
  {jp:"水もください。",hint:"Add item",example:"水もください。"}
 ],
 cityhall:[
  {jp:"住民登録をしたいです。",hint:"State purpose",example:"住民登録をしたいです。"},
  {jp:"必要なものは何ですか？",hint:"Ask requirements",example:"必要なものは何ですか？"},
  {jp:"ありがとうございます。",hint:"Be polite",example:"ありがとうございます。"}
 ],
 bike:[
  {jp:"自転車を借りたいです。",hint:"Request rental",example:"自転車を借りたいです。"},
  {jp:"一日いくらですか？",hint:"Ask price",example:"一日いくらですか？"},
  {jp:"はい、お願いします。",hint:"Confirm",example:"はい、お願いします。"}
 ],
 pharmacy:[
  {jp:"風邪薬はありますか？",hint:"Ask medicine",example:"風邪薬はありますか？"},
  {jp:"おすすめはどれですか？",hint:"Ask recommendation",example:"おすすめはどれですか？"},
  {jp:"これをください。",hint:"Choose item",example:"これをください。"}
 ],
 train:[
  {jp:"すみません、彦根までいくらですか？",hint:"Ask fare",example:"彦根までいくらですか？"},
  {jp:"どのホームですか？",hint:"Ask platform",example:"三番ホームですか？"},
  {jp:"ありがとうございます。",hint:"Be polite",example:"ありがとうございます。"}
 ],
 conbini:[
  {jp:"袋はいりますか？",hint:"Respond yes/no",example:"はい、お願いします。"},
  {jp:"温めますか？",hint:"Microwave question",example:"はい、温めてください。"},
  {jp:"ポイントカードはありますか？",hint:"Decline politely",example:"いいえ、ありません。"}
 ],
 host:[
  {jp:"はじめまして。お名前は？",hint:"Say your name",example:"はじめまして。ベンです。"},
  {jp:"どこから来ましたか？",hint:"Use ～から来ました",example:"アメリカから来ました。"},
  {jp:"よろしくお願いします。",hint:"Repeat politely",example:"よろしくお願いします。"}
 ],
 classmates:[
  {jp:"専攻は何ですか？",hint:"State major",example:"政治学です。"},
  {jp:"何年生ですか？",hint:"Say year",example:"二年生です。"},
  {jp:"よろしく！",hint:"Casual closing",example:"よろしく！"}
 ],
 professor:[
  {jp:"おはようございます。",hint:"Greet politely",example:"おはようございます。"},
  {jp:"アメリカから来ました。",hint:"Say origin",example:"アメリカから来ました。"},
  {jp:"よろしくお願いします。",hint:"Polite close",example:"よろしくお願いします。"}
 ],
 shopping:[
  {jp:"はじめまして。お名前は？",hint:"Say your name",example:"はじめまして。ベンです。"},
  {jp:"どこから来ましたか？",hint:"Use ～から来ました",example:"アメリカから来ました。"},
  {jp:"よろしくお願いします。",hint:"Repeat politely",example:"よろしくお願いします。"}
 ],
 shopping:[
  {jp:"これはいくらですか？",hint:"Ask price",example:"これはいくらですか？"},
  {jp:"ちょっと高いですね。",hint:"Comment politely",example:"ちょっと高いですね。"},
  {jp:"じゃあ、これをください。",hint:"Buy item",example:"これをください。"}
 ],
 restaurant:[
  {jp:"何にしますか？",hint:"Choose food",example:"ラーメンにします。"},
  {jp:"飲み物は？",hint:"Order drink",example:"水をお願いします。"},
  {jp:"以上ですか？",hint:"Finish order",example:"はい、以上です。"}
 ],
 time:[
  {jp:"今何時ですか？",hint:"Tell time",example:"三時です。"},
  {jp:"授業は何時からですか？",hint:"Use ～から",example:"九時からです。"},
  {jp:"ありがとうございます。",hint:"Close politely",example:"ありがとうございます。"}
 ]
};

const hiragana=["あ","い","う","え","お","か","き","く","け","こ","さ","し","す","せ","そ","た","ち","つ","て","と","な","に","ぬ","ね","の"];
const katakana=["ア","イ","ウ","エ","オ","カ","キ","ク","ケ","コ","サ","シ","ス","セ","ソ","タ","チ","ツ","テ","ト","ナ","ニ","ヌ","ネ","ノ"];

function showMenu(menu){ hideAll(); document.getElementById(menu).style.display='block'; if(menu==='progress') updateProgress(); }
function hideAll(){ ['home','survival','genki','genki2','scenario','hiragana','katakana','kanaQuiz','progress'].forEach(id=>{document.getElementById(id).style.display='none';}); }
function goHome(){ hideAll(); document.getElementById('home').style.display='block'; }

function startScenario(type){ scenario=scenarios[type]; step=0; score=0; hideAll(); document.getElementById('scenario').style.display='block'; document.getElementById('conversation').innerHTML=''; speak(scenario[step].jp); }

function speak(text){ document.getElementById('conversation').innerHTML+=`<p><b>AI:</b> ${text}</p>`; const u=new SpeechSynthesisUtterance(text); u.lang='ja-JP'; speechSynthesis.speak(u); }
function repeatPrompt(){ speak(scenario[step].jp); }
function showExample(){ document.getElementById('feedback').innerHTML=`💡 Example: ${scenario[step].example}`; }

function startListening(){ const recognition=new (window.SpeechRecognition||window.webkitSpeechRecognition)(); recognition.lang='ja-JP'; recognition.onresult=function(e){ const text=e.results[0][0].transcript; document.getElementById('conversation').innerHTML+=`<p><b>You:</b> ${text}</p>`; provideFeedback(text); step++; if(step<scenario.length){setTimeout(()=>speak(scenario[step].jp),600);}else{endScenario();} }; recognition.start(); }

function provideFeedback(text){ let fb="✔ Good attempt"; if(text.length>3) score++; if(!text.includes("です")) fb+="<br>💡 Try ending with です"; fb+=`<br><span class='badge'>Hint: ${scenario[step].hint}</span>`; document.getElementById('feedback').innerHTML=fb; }

function endScenario(){ document.getElementById('feedback').innerHTML=`Conversation Complete<br>Score ${score}/${scenario.length}`; progress.completed=(progress.completed||0)+1; localStorage.setItem("jcmuProgress",JSON.stringify(progress)); }

function buildKana(grid,data){ const g=document.getElementById(grid); g.innerHTML=""; data.forEach(k=>{ const div=document.createElement('div'); div.className='card'; div.innerText=k; div.onclick=()=>speak(k); g.appendChild(div); }); }

buildKana('hiraganaGrid',hiragana);
buildKana('katakanaGrid',katakana);

function nextQuiz(){ const all=[...hiragana,...katakana]; const k=all[Math.floor(Math.random()*all.length)]; document.getElementById('quizQuestion').innerHTML=`<div class='card'>${k}</div><p>Say this aloud</p>`; speak(k); }

function updateProgress(){ document.getElementById('progressData').innerHTML=`Conversations completed: ${progress.completed||0}`; }
</script>

</body>
