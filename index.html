<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JCMU Japanese Trainer</title>
<style>
body {font-family: Arial, sans-serif;margin:0;padding:0;background:#f5f5f5;}
header {background:#003366;color:white;padding:16px;text-align:center;font-size:20px;}
.container {padding:16px;}
button {width:100%;padding:14px;margin:8px 0;font-size:16px;border-radius:10px;border:none;background:#0066cc;color:white;}
button.secondary {background:#888;}
#conversation {background:white;padding:16px;border-radius:12px;min-height:200px;margin-bottom:12px;}
.feedback {background:#fff;padding:12px;border-radius:12px;}
.badge {display:inline-block;padding:4px 8px;margin:2px;border-radius:8px;background:#e0f0ff;font-size:12px;}
.grid {display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.card {background:white;padding:12px;border-radius:10px;text-align:center;font-size:20px;}
.progress {background:white;padding:12px;border-radius:12px;margin-top:10px;}
</style>
</head>
<body>
<header>JCMU Japanese Trainer</header>
<div class="container">

<div id="home">
<h3>Core Training</h3>
<button onclick="showMenu('genki')">📘 Genki Lesson 1</button>
<button onclick="showMenu('genki2')">📗 Genki Lesson 2</button>
<button onclick="showMenu('survival')">🗺 JCMU Survival Mode</button>
<button onclick="showMenu('hiragana')">🔤 Hiragana Unit</button>
<button onclick="showMenu('katakana')">🔡 Katakana Unit</button>

</div>

<div id="survival" style="display:none;">
<h3>JCMU Survival Mode</h3>
<button onclick="startScenario('train')">🚉 Train Station</button>
<button onclick="startScenario('conbini')">🏪 Convenience Store</button>
<button class="secondary" onclick="goHome()">Back</button>
</div>

<div id="genki" style="display:none;">
<h3>Genki I - Lesson 1</h3>
<button onclick="startScenario('host')">🎤 Meet Host Family</button>
<button onclick="startScenario('classmates')">🎤 Meet Classmates</button>
<button onclick="startScenario('professor')">🎤 Meet Professor</button>

</div>

<button class="secondary" onclick="goHome()">Back</button>
</div>

<div id="scenario" style="display:none;">
<div id="conversation"></div>

<button onclick="startListening()">🎤 Tap to Speak</button>

<div id="quizQuestion"></div>
<button onclick="nextQuiz()">Next</button>
<button class="secondary" onclick="goHome()">Back</button>
</div>

<div id="progress" style="display:none;">
<h3>Student Progress</h3>
<div class="progress" id="progressData"></div>
<button class="secondary" onclick="goHome()">Back</button>
</div>

</div>

<script>
let scenario=null;
let step=0;
let score=0;
let role='student';
let progress=JSON.parse(localStorage.getItem("jcmuProgress")||"{}");

const scenarios={
 host:[
  {jp:"はじめまして。",en:"Nice to meet you.",example:"はじめまして。ベンです。"},
  {jp:"お名前は？",en:"What is your name?",example:"ベンです。"},
  {jp:"どこから来ましたか？",en:"Where are you from?",example:"アメリカから来ました。"}
 ],
 classmates:[
  {jp:"専攻は何ですか？",en:"What is your major?",example:"政治学です。"},
  {jp:"何年生ですか？",en:"What year are you?",example:"二年生です。"},
  {jp:"よろしく！",en:"Nice to meet you (casual)",example:"よろしく！"}
 ],
 professor:[
  {jp:"おはようございます。",en:"Good morning.",example:"おはようございます。"},
  {jp:"アメリカから来ました。",en:"I came from America.",example:"アメリカから来ました。"},
  {jp:"よろしくお願いします。",en:"Nice to meet you.",example:"よろしくお願いします。"}
 ],
 shopping:[
  {jp:"これはいくらですか？",en:"How much is this?",example:"これはいくらですか？"},
  {jp:"これをください。",en:"I'll take this.",example:"これをください。"}
 ],
 train:[
  {jp:"彦根までいくらですか？",en:"How much to Hikone?",example:"彦根までいくらですか？"}
 ],
 conbini:[
  {jp:"袋はいりますか？",en:"Do you need a bag?",example:"はい、お願いします。"}
 ]
};

const hiragana=["あ","い","う","え","お","か","き","く","け","こ"];
const katakana=["ア","イ","ウ","エ","オ","カ","キ","ク","ケ","コ"];

function showMenu(menu){ hideAll(); document.getElementById(menu).style.display='block'; if(menu==='progress') updateProgress(); }
function hideAll(){ ['home','survival','genki','genki2','scenario','hiragana','katakana','kanaQuiz','progress'].forEach(id=>{document.getElementById(id).style.display='none';}); }
function goHome(){ hideAll(); document.getElementById('home').style.display='block'; }

function startScenario(type){
 scenario=scenarios[type];
 step=0;
 score=0;
 role='student';
 hideAll();
 document.getElementById('scenario').style.display='block';
 document.getElementById('conversation').innerHTML='';
 speakLine();
}

function toggleRole(){
 role = role==='student' ? 'ai' : 'student';
 restartScenario();
}

function speakLine(){
 const line=scenario[step];
 if(role==='student'){
  speak(line.jp,line.en);
 }else{
  document.getElementById('conversation').innerHTML+=`<p><b>You:</b> ${line.jp}<br><i>${line.en}</i></p>`;
  setTimeout(()=>{ step++; if(step<scenario.length) speakLine(); else endScenario();},800);
 }
}

function speak(text,en){
 document.getElementById('conversation').innerHTML+=`<p><b>AI:</b> ${text}<br><i>${en||''}</i></p>`;
 const u=new SpeechSynthesisUtterance(text);
 u.lang='ja-JP';
 speechSynthesis.speak(u);
}

function restartScenario(){
 step=0;
 document.getElementById('conversation').innerHTML='';
 document.getElementById('feedback').innerHTML='';
 speakLine();
}

function repeatPrompt(){ speak(scenario[step].jp, scenario[step].en); }
function showExample(){ document.getElementById('feedback').innerHTML=`💡 Example: ${scenario[step].example}`; }

function startListening(){
 const recognition=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
 recognition.lang='ja-JP';
 recognition.onresult=function(e){
  const text=e.results[0][0].transcript;
  document.getElementById('conversation').innerHTML+=`<p><b>You:</b> ${text}</p>`;
  step++;
  if(step<scenario.length){ speakLine(); } else { endScenario(); }
 };
 recognition.start();
}

function endScenario(){
 document.getElementById('feedback').innerHTML=`Conversation Complete<br><button onclick="restartScenario()">🔁 Practice Again</button>`;
 progress.completed=(progress.completed||0)+1;
 localStorage.setItem("jcmuProgress",JSON.stringify(progress));
}

function buildKana(grid,data){
 const g=document.getElementById(grid);
 g.innerHTML="";
 data.forEach(k=>{
  const div=document.createElement('div');
  div.className='card';
  div.innerText=k;
  div.onclick=()=>speak(k);
  g.appendChild(div);
 });
}

buildKana('hiraganaGrid',hiragana);
buildKana('katakanaGrid',katakana);

function nextQuiz(){
 const all=[...hiragana,...katakana];
 const k=all[Math.floor(Math.random()*all.length)];
 document.getElementById('quizQuestion').innerHTML=`<div class='card'>${k}</div>`;
 speak(k);
}

function updateProgress(){
 document.getElementById('progressData').innerHTML=`Conversations completed: ${progress.completed||0}`;
}
</script>

</body>
